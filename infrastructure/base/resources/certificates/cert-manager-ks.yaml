apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 10m
  timeout: 10m
  path: ./infrastructure/base/resources/certificates/cert-manager
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system