    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: linkerd-viz-gateway
      namespace: flux-system
    spec:
      interval: 10m
      timeout: 10m
      retryInterval: 1m
      path: ./fluxcd/infrastructure/common/resources/linkerd/5-viz-gateway
      prune: true
      force: false
      wait: true
      sourceRef:
        kind: GitRepository
        name: flux-system
      dependsOn:
        - name: linkerd-viz
      postBuild:
        substituteFrom:
          - kind: ConfigMap
            name: cluster-vars
