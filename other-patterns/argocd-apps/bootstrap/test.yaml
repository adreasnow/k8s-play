apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/adreasnow/k8s-play.git
    targetRevision: HEAD
    path: argocd-apps/clusters/test
  destination:
    server: https://test.domain.local
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true