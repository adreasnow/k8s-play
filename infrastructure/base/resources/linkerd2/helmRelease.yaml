apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkerd
  namespace: linkerd
spec:
  interval: 10m
  chart:
    spec:
      chart: linkerd2
      version: 39.0.6
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: false
  upgrade:
    cleanupOnFail: true
  values:
    identityTrustAnchorsPEM: ca.crt
    identity:
      issuer:
        tls:
          crtPEM: issuer.crt
          keyPEM: issuer.key
