apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: loki
      version: 13.2.2
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
      interval: 1h
  targetNamespace: telemetry
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullname: telemetry-tempo
    multitenancyEnabled: true
    replicas: ${azCount}
    tempo.tag: 3.7.1
    # storage:
    #   trace:
    #     backend: s3
    #     s3:
    #       bucket: bellroy-tempo-owlwayson
    #       endpoint: s3.us-east-1.amazonaws.com
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: StatefulSet
              name: tempo
            patch: |
              - op: add
                path: /spec/template/spec/topologySpreadConstraints
                value:
                  - maxSkew: 1
                    topologyKey: topology.kubernetes.io/zone
                    whenUnsatisfiable: DoNotSchedule
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: tempo
