apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: meshed-service-v1alpha1
spec:
  schema:
    apiVersion: v1alpha1
    group: bellroy.com
    kind: MeshedService
    scope: Namespaced
    types:
      Port:
        port: integer | required=true
        protocol: string | required=true

      HttpHeaders:
        name: string
        value: string

    spec:
      name: string | required=true
      ports: "[]Port"
      ingress:
        hostname: string | required=false
        path: string | default=/
        enabled:
          internal: boolean | default=false
          external: boolean | default=false

  resources:
    - id: clusterVars
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: cluster-vars
          namespace: flux-operator

    - id: northSouthHTTPRoute
      includeWhen:
        - ${schema.spec.ingress.enabled.external}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${schema.spec.name}
        spec:
          parentRefs:
            - name: traefik-gateway # north-south
              namespace: traefik
              sectionName: websecure
          hostnames:
            - ${schema.spec.ingress.hostname + "." + clusterVars.data.?domain.orValue("")}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: ${schema.spec.ingress.path}
              backendRefs:
                - name: ${schema.spec.name}
                  port: ${schema.spec.ports[0].port}

    - id: eastWestHTTPRoute
      includeWhen:
        - ${schema.spec.ingress.enabled.external || schema.spec.ingress.enabled.internal}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${schema.spec.name}-mesh-route
          namespace: ${schema.metadata.namespace}
        spec:
          parentRefs:
            - name: ${schema.spec.name}
              kind: Service
              group: ""       # core API group — standard GAMMA pattern
              port: ${schema.spec.ports[0].port}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: ${schema.spec.ingress.path}
              backendRefs:
                - name: ${schema.spec.name}
                  port: ${schema.spec.ports[0].port}

    - id: allowAllMeshedClients
      includeWhen:
        - ${schema.spec.ingress.enabled.external || schema.spec.ingress.enabled.internal}
      template:
        apiVersion: security.istio.io/v1
        kind: AuthorizationPolicy
        metadata:
          name: ${schema.spec.name}-allow-mesh
          namespace: ${schema.metadata.namespace}
        spec:
          targetRefs:
            - group: ""
              kind: Service
              name: ${schema.spec.name}
          action: ALLOW
          rules:
            - from:
                - source:
                    principals: ["cluster.local/*"]

    - id: requireWaypointAtL4
      includeWhen:
        - ${schema.spec.ingress.enabled.external || schema.spec.ingress.enabled.internal}
      template:
        apiVersion: security.istio.io/v1
        kind: AuthorizationPolicy
        metadata:
          name: ${schema.spec.name}-require-waypoint
          namespace: ${schema.metadata.namespace}
        spec:
          selector:
            matchLabels:
              app: ${schema.spec.name}
          action: ALLOW
          rules:
            - from:
                - source:
                    # Only accept from the namespace waypoint
                    principals:
                      - "cluster.local/ns/${schema.metadata.namespace}/sa/waypoint"
            - from:
                - source:
                    # Allow same-namespace traffic (e.g. kubelet health probes
                    # routed via ztunnel, or co-located services)
                    namespaces: ["${schema.metadata.namespace}"]
