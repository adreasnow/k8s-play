apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: 40.0.0-ea.3
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 1h
  targetNamespace: traefik
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: traefik-values
      valuesKey: networking
    - kind: ConfigMap
      name: traefik-values
      valuesKey: pods
    - kind: ConfigMap
      name: traefik-values
      valuesKey: services
    # - kind: ConfigMap # TODO: configure/enable aws lb
    #   name: traefik-values
    #   valuesKey: aws-lb
    - kind: ConfigMap
      name: traefik-values
      valuesKey: observability
    - kind: ConfigMap
      name: traefik-values
      valuesKey: dashboard
