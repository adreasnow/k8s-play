apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-charts
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - "missingkey=error"
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/adreasnow/k8s-play.git
              revision: HEAD
              files:
                - path: "argocd-appsets/infrastructure/charts/*/config.yaml"
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
              values:
                clusterName: "{{ .name }}"
  template:
    metadata:
      name: "{{ .name }}-{{ .values.clusterName }}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .syncWave }}"
    spec:
      project: infrastructure
      sources:
        - repoURL: "{{ .repoURL }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .version }}"
          helm:
            releaseName: "{{ .name }}"
            valueFiles:
              - "$values/argocd-appsets/infrastructure/charts/{{ .name }}/values.yaml"
              - "$values/argocd-appsets/infrastructure/charts/{{ .name }}/values-{{ .values.clusterName }}.yaml"
            ignoreMissingValueFiles: true
        - repoURL: https://github.com/adreasnow/k8s-play.git
          targetRevision: HEAD
          ref: values
      destination:
        server: "{{ .server }}"
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace={{ .createNamespace }}
        retry:
          limit: 5
          backoff:
            duration: "30s"
            factor: 2
