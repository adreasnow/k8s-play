apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: tempo
      version: 2.0.0
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
      interval: 1h
  targetNamespace: telemetry
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    multitenancyEnabled: true
    replicas: ${azCount}
    tempo.tag: 2.10.4
