apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kro
  namespace: flux-system
spec:
  targetNamespace: kro-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  wait: true
  prune: true
  path: ./
  sourceRef:
    kind: OCIRepository
    name: kro
  install:
    createNamespace: true
