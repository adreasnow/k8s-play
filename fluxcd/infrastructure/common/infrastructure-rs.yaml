apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: infrastructure-common
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: 1h
    fluxcd.controlplane.io/reconcileTimeout: 10m
spec:
  wait: true
  inputs:
    - name: namespaces-common
      path: ./fluxcd/infrastructure/common/namespaces

    - name: istio
      path: ./fluxcd/infrastructure/common/resources/istio

    - name: netowrking-extras
      path: ./fluxcd/infrastructure/common/resources/networking
      deps: [istio]

    - name: cert-manager
      path: ./fluxcd/infrastructure/common/resources/cert-manager

    - name: cluster-issuer
      path: ./fluxcd/infrastructure/common/resources/cluster-issuer
      deps: [cert-manager]

    - name: kro
      path: ./fluxcd/infrastructure/common/resources/kro

    - name: kro-definitions
      path: ./fluxcd/infrastructure/common/resources/kro-definitions
      deps: [kro, istio]
      substituteFrom:
        - name: cluster-vars

    - name: traefik
      path: ./fluxcd/infrastructure/common/resources/traefik
      deps: [cluster-issuer, namespaces-common]
      substituteFrom:
        - name: cluster-vars

    - name: flux-operator-dashboard
      path: ./fluxcd/infrastructure/common/resources/flux-operator-dashboard
      substituteFrom:
        - name: cluster-vars

  resourcesTemplate: |
    ---
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: << inputs.name >>
      namespace: flux-system
    spec:
      interval: 10m
      timeout: 10m
      retryInterval: 1m
      path: << inputs.path >>
      prune: << get inputs "prune" | default "false" >>
      force: << get inputs "force" | default "false" >>
      wait: true
      sourceRef:
        kind: GitRepository
        name: flux-system
    <<- if get inputs "deps" >>
      dependsOn:
      <<- range $dep := inputs.deps >>
        - name: << $dep >>
      <<- end >>
    <<- end >>
    <<- if get inputs "substituteFrom" >>
      postBuild:
        substituteFrom:
      <<- range $sub := inputs.substituteFrom >>
          - kind: << get $sub "kind" | default "ConfigMap" >>
            name: << $sub.name >>
      <<- end >>
    <<- end >>
