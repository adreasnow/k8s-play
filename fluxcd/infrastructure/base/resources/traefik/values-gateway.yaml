# Disable the default IngressClass since we use Gateway API
ingressClass:
  enabled: false

# Providers tell Traefik where to find routing configuration
providers:
  kubernetesIngress:
    enabled: false
  kubernetesGateway:
    enabled: true
    nativeLBByDefault: true # Use native load balancer for Gateway listeners to keep traffic local

# EntryPoints are the network listeners for incoming traffic
ports:
  websecure:
    port: 443
    hostPort: 443
  web:
    port: 80
    hostPort: 80
    http:
      redirections:         # redirects all traffic to the 'websecure' entry point
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

# Gateway Listeners
gateway:
  listeners:
    web:
      port: 80
      protocol: HTTP
      namespacePolicy:
        from: All

    websecure:
      port: 443
      protocol: HTTPS
      namespacePolicy:
        from: All
      mode: Terminate
      certificateRefs:
        - kind: Secret
          name: local-selfsigned-tls  # the Secret we created before the installation
          group: ""
