apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: 40.0.0-ea.3
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 1h
  targetNamespace: traefik
  install:
    createNamespace: false
  upgrade:
    cleanupOnFail: true
  valuesFrom:
    - kind: ConfigMap
      name: traefik-values-gateway
    - kind: ConfigMap
      name: traefik-values-pods
    - kind: ConfigMap
      name: traefik-values-services
    # - kind: ConfigMap
    #   name: traefik-values-aws-lb
    - kind: ConfigMap
      name: traefik-values-observability
    - kind: ConfigMap
      name: traefik-values-dashboard
