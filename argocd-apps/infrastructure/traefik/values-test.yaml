ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`dashboard.test.domain.local`)
    entryPoints:
      - websecure
    middlewares:
      - name: dashboard-auth

extraObjects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: dashboard-auth-secret
    type: kubernetes.io/basic-auth
    stringData:
      username: admin
      password: admin
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: dashboard-auth
    spec:
      basicAuth:
        secret: dashboard-auth-secret
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: local-selfsigned-tls
      namespace: traefik
    spec:
      secretName: local-selfsigned-tls
      issuerRef:
        name: selfsigned-cluster-issuer
        kind: ClusterIssuer
      commonName: "*.test.domain.local"
      dnsNames:
        - "*.test.domain.local"
        - "test.domain.local"
      duration: 8760h
      renewBefore: 360h