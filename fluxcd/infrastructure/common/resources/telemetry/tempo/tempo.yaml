apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: tempo-distributed
      version: 2.0.0
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
      interval: 1h
  targetNamespace: telemetry
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: tempo-values
      valuesKey: values
  values:
    fullnameOverride: telemetry-tempo
    multitenancyEnabled: true
    tempo.tag: 2.10.4

    # Swap these when S3 is available
    minio.enabled: true
    # storage:
    #   trace:
    #     backend: s3
    #     s3:
    #       bucket: ${tempoBucketName}
    #       endpoint: s3.${awsRegion}.amazonaws.com
