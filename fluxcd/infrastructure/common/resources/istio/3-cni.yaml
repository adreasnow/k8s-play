apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-cni
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: istiod
  chart:
    spec:
      chart: cni
      version: 1.29.1
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      interval: 1h
  targetNamespace: istio-system
  upgrade:
    cleanupOnFail: true
  values:
    profile: ambient
    global:
      platform: minikube
