# ClusterRole for the DaemonSet OTel Collector.
#
# Permissions required by:
#   - kubeletstats receiver: read node/pod stats from the kubelet API
#   - k8sattributes processor: discover pods and workload metadata
#   - filelog receiver: no K8s API access needed (reads from host filesystem)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-daemonset
rules:
  # ── kubeletstats receiver ────────────────────────────────────────────
  # Needs access to node stats and metrics endpoints on the kubelet.
  - apiGroups: [""]
    resources: ["nodes", "nodes/stats", "nodes/metrics"]
    verbs: ["get", "list", "watch"]
  # Access to pods and namespaces for kubeletstats resource attribution.
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]

  # ── k8sattributes processor ──────────────────────────────────────────
  # Discovers pods by IP and enriches telemetry with workload metadata.
  - apiGroups: [""]
    resources: ["pods", "namespaces", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  # Workload metadata: deployments, statefulsets, daemonsets, replicasets.
  - apiGroups: ["apps", "extensions"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # Job and CronJob metadata.
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]