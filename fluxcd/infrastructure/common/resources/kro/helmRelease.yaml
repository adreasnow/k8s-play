apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kro
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kro
      version: 0.9.1
      sourceRef:
        kind: HelmRepository
        name: kro
        namespace: flux-system
      interval: 1h
  targetNamespace: kro-system
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
