deployment:
  replicas: 2 # match the number of AZs

# One Traefik per AZ
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: traefik

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# podAnnotations:
#   ambient.istio.io/redirection: disabled

additionalArguments:
  - "--ping"
  - "--ping.entryPoint=web"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi
