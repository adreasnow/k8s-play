apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: infrastructure
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: 1h
spec:
  inputs:
    - name: namespaces
      path: ./fluxcd/infrastructure/base/namespaces
  resourcesTemplate: |
    ---
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: << inputs.name >>
      namespace: flux-system
    spec:
      interval: 10m
      timeout: 10m
      retryInterval: 1m
      path: << inputs.path >>
      prune: << get inputs "prune" | default "true" >>
      force: << get inputs "force" | default "false" >>
      wait: true
      sourceRef:
        kind: GitRepository
        name: flux-system
    <<- if get inputs "deps" >>
      dependsOn:
      <<- range $dep := inputs.deps >>
        - name: << $dep >>
      <<- end >>
    <<- end >>
    <<- if get inputs "substituteFrom" >>
      postBuild:
        substituteFrom:
      <<- range $sub := inputs.substituteFrom >>
          - kind: << get $sub "kind" | default "ConfigMap" >>
            name: << $sub.name >>
      <<- end >>
    <<- end >>
