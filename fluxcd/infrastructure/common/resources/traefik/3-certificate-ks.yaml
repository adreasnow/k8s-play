    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: traefik-tls-certificate
      namespace: flux-system
    spec:
      interval: 10m
      timeout: 10m
      retryInterval: 1m
      path: ./fluxcd/infrastructure/common/resources/traefik/3-certificate
      prune: false
      force: false
      wait: true
      sourceRef:
        kind: GitRepository
        name: flux-system
      dependsOn:
        - name: traefik-namespace
        - name: traefik-tls-cluster-issuer
      postBuild:
        substituteFrom:
          - kind: ConfigMap
            name: cluster-vars
