apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: meshed-service-v1alpha1
spec:
  schema:
    apiVersion: v1alpha1
    group: bellroy.com
    kind: MeshedService
    scope: Namespaced
    types:
      HTTPRoute:
        enabled: boolean | default=false
        ports: '[]integer | required=true'
        path: string | default=/

      GRPCRoute:
        enabled: boolean | default=false
        ports: '[]integer | required=true'
        path: string | default=/

    spec:
      service: string | required=true
      hostname: string | required=false

      internal:
        http: HTTPRoute
        grpc: GRPCRoute

      external:
        http: HTTPRoute
        grpc: GRPCRoute

  resources:
    - id: clusterVars
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: cluster-vars
          namespace: flux-system

    - id: northSouthRoute
      includeWhen:
        - ${schema.spec.external.http.enabled}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${schema.spec.service}
        spec:
          parentRefs:
            - name: traefik-gateway # north-south
              namespace: traefik
              sectionName: websecure
          hostnames:
            - ${schema.spec.hostname + "." + clusterVars.data.?domain.orValue("")}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: ${schema.spec.external.http.path}
              backendRefs: '${schema.spec.external.http.ports.map(p, {
                "name": schema.spec.service,
                "port": p
                })}'

    # East/West: Mesh access via GAMMA (Service parentRef)
    # This handles internal path based routing
    - id: eastWestHTTPRoute
      includeWhen:
        - ${schema.spec.external.http.enabled || schema.spec.internal.http.enabled}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${schema.spec.service}-mesh-route
          namespace: ${schema.metadata.namespace}
        spec:
          parentRefs: '${schema.spec.internal.http.ports.map(p, {
            "name": schema.spec.service,
            "kind": "Service",
            "group": "",
            "port": p,
            "sectionName": "port-" + string(p)
            })}'
          hostnames:
            - ${schema.spec.hostname + "." + clusterVars.data.?domain.orValue("")}
            - ${schema.spec.hostname + ".cluster.local"}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: ${schema.spec.internal.http.path}
              backendRefs: '${schema.spec.internal.http.ports.map(p, {
                "name": schema.spec.service,
                "port": p
                })}'

    - id: allowAllMeshedClients
      includeWhen:
        - ${schema.spec.internal.http.enabled || schema.spec.external.http.enabled}
      template:
        apiVersion: security.istio.io/v1
        kind: AuthorizationPolicy
        metadata:
          name: ${schema.spec.service}-allow-mesh
          namespace: ${schema.metadata.namespace}
        spec:
          targetRefs:
            - group: ""
              kind: Service
              name: ${schema.spec.service}
          action: ALLOW
          rules:
            - from:
                - source:
                    principals: ["cluster.local/*"]

    - id: requireWaypoint
      includeWhen:
        - ${schema.spec.internal.http.enabled || schema.spec.external.http.enabled}
      template:
        apiVersion: security.istio.io/v1
        kind: AuthorizationPolicy
        metadata:
          name: ${schema.spec.service}-require-waypoint
          namespace: ${schema.metadata.namespace}
        spec:
          # targetRefs is the ambient-native pattern; enforced at the
          # waypoint (since the namespace has one) rather than at ztunnel
          # via a label selector.
          targetRefs:
            - group: ""
              kind: Service
              name: ${schema.spec.service}
          action: ALLOW
          rules:
            - from:
                - source:
                    # Only accept from the namespace waypoint
                    principals:
                      - "cluster.local/ns/${schema.metadata.namespace}/sa/waypoint"
            - from:
                - source:
                    # Allow same-namespace traffic (e.g. kubelet health probes
                    # routed via ztunnel, or co-located services)
                    namespaces: ["${schema.metadata.namespace}"]
