apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: infrastructure
  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 39.0.6
      helm:
        valueFiles:
          - $values/argocd-apps/infrastructure/traefik/values.yaml
          - $values/argocd-apps/infrastructure/traefik/values-CLUSTER.yaml
        ignoreMissingValueFiles: true
    - repoURL: https://github.com/adreasnow/k8s-play.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2