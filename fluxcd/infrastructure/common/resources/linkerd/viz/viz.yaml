apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkerd-viz
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: linkerd-viz
      version: 2026.4.3
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
      interval: 1h
  targetNamespace: linkerd-viz
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    clusterDomain: ${domain}
    dashboard:
      enforcedHostRegexp: ".*"
