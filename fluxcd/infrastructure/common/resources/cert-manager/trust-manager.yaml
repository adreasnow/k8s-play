apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: flux-system
spec:
  interval: 10m
  depends-on:
    - name: cert-manager
  chart:
    spec:
      chart: trust-manager
      version: 1.20.1
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 1h
  targetNamespace: cert-manager
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
  values:
    app:
      trust:
        namespace: cert-manager
