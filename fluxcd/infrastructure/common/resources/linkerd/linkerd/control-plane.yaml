apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkerd-control-plane
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
  - name: linkerd-crds
  chart:
    spec:
      chart: linkerd-control-plane
      version: 1.16.11
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
      interval: 1h
  targetNamespace: linkerd
  install:
    createNamespace: false
  upgrade:
    cleanupOnFail: true
  values:
    identity:
      externalCA: true
      issue:
        scheme: kubernetes.io/tls
