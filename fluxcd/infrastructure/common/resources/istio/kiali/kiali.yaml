apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kiali-server
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kiali-server
      version: 2.24.0
      sourceRef:
        kind: HelmRepository
        name: kiali
        namespace: flux-system
      interval: 1h
  targetNamespace: istio-system
  upgrade:
    cleanupOnFail: true
  values:
    auth:
      strategy: anonymous
