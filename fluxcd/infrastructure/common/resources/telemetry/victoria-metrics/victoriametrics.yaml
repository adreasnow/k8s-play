apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoriametrics
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: victoria-metrics-single
      version: 0.35.0
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: flux-system
      interval: 1h
  targetNamespace: victoriametrics
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    nameOverride: vm
    server:
      replicaCount: ${azCount}
      persistentVolume:
        enabled: true
        size: 16Gi
        # storageClassName: ebs-topology
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule

      extraArgs:
        dedup.minScrapeInterval: 30s
        promscrape.cluster.membersCount: ${azCount}

      # # Enterprise only
      # vmbackupmanager:
      #   # destination: "s3://"
      #   enabled: true
      #   restore.onStart.enabled: true

      service:
        trafficDistribution: PreferClose
        clusterIP: ""
