apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kiali-operator
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kiali-operator
      version: 2.24.0
      sourceRef:
        kind: HelmRepository
        name: kiali
        namespace: flux-system
      interval: 1h
  targetNamespace: kiali-operator
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
  values:
    cr:
      namespace: istio-system
      create: true
      spec:
        auth:
          strategy: anonymous
