apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kro
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kro
      version: 0.9.1
      sourceRef:
        kind: HelmRepository
        name: kro
        namespace: flux-system
      interval: 1h
  targetNamespace: kro-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    config:
      # More workers = less queue backlog = less chance of stale state
      dynamicControllerConcurrentReconciles: 5
      # Reduce resync from 10h to 30m — catches stuck instances much faster
      dynamicControllerDefaultResyncPeriod: 1800
      # More retries before dropping (default 20 is low for flaky reconciles)
      dynamicControllerDefaultQueueMaxRetries: 50
      # Increase API server throughput to avoid throttling-induced failures
      clientQps: 200
      clientBurst: 300
      # Faster requeue when waiting for resources (default 3s is fine, but
      # you can lower to 1s for faster convergence in dev)
      instance:
        requeueInterval: 2s
