apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: meshed-service-v1alpha1
spec:
  schema:
    apiVersion: v1alpha1
    group: bellroy.com
    kind: MeshedService
    scope: Namespaced
    types:
      Port:
        port: integer | required=true
        protocol: string | required=true

      HttpHeaders:
        name: string
        value: string

      Probe:
        httpGet:
          path: string | required=true
          port: integer | required=true
          httpHeaders: '[]HttpHeaders'

        initialDelaySeconds: integer | default=15
        periodSeconds: integer | default=5
        timeoutSeconds: integer | default=3
        failureThreshold: integer | default=3

    spec:
      name: string | required=true
      replicas: integer | default=2
      container:
        image: string | required=true
        imagePullPolicy: string | default=Always
        ports: "[]Port"

      ingress:
        hostname: string | required=false
        path: string | default=/
        enabled:
          internal: boolean | default=false
          external: boolean | default=false


      livenessProbe: Probe | required=false
      startupProbe: Probe | required=false
      readinessProbe: Probe | required=false

      resources:
        limits:
          cpu: string | required=true
          memory: string | required=true
        requests:
          cpu: string | required=true
          memory: string | required=true

  resources:
    - id: clusterVars
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: cluster-vars
          namespace: flux-operator

    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app: ${schema.spec.name}
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
            spec:
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: topology.kubernetes.io/zone
                  whenUnsatisfiable: ScheduleAnyway
                  labelSelector:
                    matchLabels:
                      app: ${schema.spec.name}
              containers:
                - name: ${schema.spec.name}
                  image: ${schema.spec.container.image}
                  imagePullPolicy: ${schema.spec.container.imagePullPolicy}
                  ports: '${schema.spec.container.ports.map(p, {"containerPort": p.port, "protocol": p.protocol})}'
                  resources:
                    limits:
                      cpu: ${schema.spec.resources.limits.cpu}
                      memory: ${schema.spec.resources.limits.memory}
                    requests:
                      cpu: ${schema.spec.resources.requests.cpu}
                      memory: ${schema.spec.resources.requests.memory}
                  securityContext:
                    runAsNonRoot: true
                    allowPrivilegeEscalation: false
                    seccompProfile:
                      type: RuntimeDefault
                    capabilities:
                      drop: ["ALL"]

    - id: svc
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}
        spec:
          trafficDistribution: PreferClose # Prefer same AZ/same node endpoints (k8s)
          selector:
            app: ${schema.spec.name}
          ports: '${schema.spec.container.ports.map(p, {"port": p.port, "targetPort": p.port, "protocol": p.protocol})}'

    - id: serviceAccount # TODO: figure out proper RBAC...
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: ${schema.spec.name}
        automountServiceAccountToken: false

    - id: northSouthHTTPRoute
      includeWhen:
        - ${schema.spec.ingress.enabled.external}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${schema.spec.name}
        spec:
          parentRefs:
            - name: traefik-gateway # north-south
              namespace: traefik
              sectionName: websecure
          hostnames:
            - ${schema.spec.ingress.hostname + "." + clusterVars.data.?domain.orValue("")}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: ${schema.spec.ingress.path}
              backendRefs:
                - name: ${schema.spec.name}
                  port: ${schema.spec.container.ports[0].port}

    - id: eastWestHTTPRoute
      includeWhen:
        - ${schema.spec.ingress.enabled.external || schema.spec.ingress.enabled.internal}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${schema.spec.name}-mesh-route
          namespace: ${schema.metadata.namespace}
        spec:
          parentRefs:
            - name: ${schema.spec.name}
              kind: Service
              group: ""       # core API group — standard GAMMA pattern
              port: ${schema.spec.container.ports[0].port}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: ${schema.spec.ingress.path}
              backendRefs:
                - name: ${schema.spec.name}
                  port: ${schema.spec.container.ports[0].port}

