apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-resources
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - "missingkey=error"
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/adreasnow/k8s-play.git
              revision: HEAD
              directories:
                - path: "argocd-appsets/infrastructure/resources/*"
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
              values:
                clusterName: "{{ .name }}"
  template:
    metadata:
      name: "{{ .path.basename }}-{{ .values.clusterName }}"
    spec:
      project: infrastructure
      source:
        repoURL: https://github.com/adreasnow/k8s-play.git
        targetRevision: HEAD
        path: "{{ .path.path }}"
      destination:
        server: "{{ .server }}"
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: "30s"
            factor: 2