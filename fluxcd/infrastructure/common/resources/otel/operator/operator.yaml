apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-operator
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: opentelemetry-operator
      version: 6.0.6
      sourceRef:
        kind: HelmRepository
        name: otel
        namespace: flux-system
      interval: 1h
  targetNamespace: otel-operator
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    manager:
      collectorImage:
        repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
    admissionWebhooks:
      certManager:
        enabled: false
      autoGenerateCert:
        enabled: true
