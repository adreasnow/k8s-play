apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-tls-cert
  namespace: traefik
spec:
  secretName: traefik-tls-cert
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
  commonName: "*.${domain}"
  dnsNames:
    - "*.${domain}"
    - "${domain}"
  duration: 2160h    # 90 days
  renewBefore: 360h  # renew 15 days before expiry
