apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

patches:
  # Set destination server for ALL applications
  - target:
      kind: Application
      group: argoproj.io
    patch: |
      - op: replace
        path: /spec/destination/server
        value: https://kubernetes.default.svc

  # Patch traefik to use staging values file
  - target:
      kind: Application
      group: argoproj.io
      name: traefik
    patch: |
      - op: replace
        path: /spec/sources/0/helm/valueFiles/1
        value: $values/argocd-apps/infrastructure/traefik/values-staging.yaml

  # Patch demo to use staging values file
  - target:
      kind: Application
      group: argoproj.io
      name: demo
    patch: |
      - op: replace
        path: /spec/source/helm/valueFiles/1
        value: values-staging.yaml