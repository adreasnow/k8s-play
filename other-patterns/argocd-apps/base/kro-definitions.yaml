apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kro-definitions
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/adreasnow/k8s-play.git
    targetRevision: HEAD
    path: argocd-apps/infrastructure/kro-definitions
  destination:
    server: none
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
