# OpenTelemetry Collector that scrapes Istio ambient mesh metrics (istiod, ztunnel, waypoint proxies)
# and pushes them to VictoriaMetrics via OTLP for Kiali to consume.
#
# Metrics scraped:
#   - istiod:        control plane metrics (pilot_*, istio_build)
#   - ztunnel:       L4 ambient metrics (istio_tcp_*, connection metrics)
#   - waypoint:      L7 Envoy metrics (istio_requests_*, istio_request/response_*, envoy_*)
#
# NOTE: metric_relabel_configs with __name__ does NOT work in the OTel Collector's
# Prometheus receiver. The receiver converts Prometheus metrics to OTLP format before
# relabeling runs, and __name__ is no longer a label in the OTLP data model — it becomes
# the metric name field. Filtering on __name__ silently drops everything that doesn't
# accidentally match. Use the OTel filter processor instead.
#
# References:
#   - https://istio.io/latest/docs/ops/integrations/prometheus/
#   - https://grafana.com/docs/mimir/latest/configure/configure-otel-collector/
#   - https://kiali.io/docs/faq/general/#requiredmetrics
#   - https://ambientmesh.io/docs/observability/metrics/
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: istio-metrics
  namespace: istio-system
spec:
  mode: deployment
  serviceAccount: otel-collector-istio-metrics
  config:
    receivers:
      prometheus:
        config:
          scrape_configs:
            # ── Istiod control plane ──────────────────────────────────────
            # Scrapes pilot_*, istio_build, and other control-plane metrics.
            # Uses role: pod instead of role: endpoints (deprecated in K8s 1.33+).
            # Discovered via app=istiod label; port 15014 is http-monitoring.
            - job_name: istiod
              scrape_interval: 15s
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - istio-system
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app]
                  action: keep
                  regex: istiod
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: http-monitoring

            # ── ztunnel (ambient L4 proxy) ────────────────────────────────
            # ztunnel runs as a DaemonSet and exposes L4 TCP metrics on port
            # 15020 at /metrics. These include istio_tcp_* metrics that Kiali
            # uses for TCP traffic visualisation.
            - job_name: ztunnel
              scrape_interval: 15s
              metrics_path: /metrics
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - istio-system
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app]
                  action: keep
                  regex: ztunnel
                - source_labels: [__meta_kubernetes_pod_ip]
                  action: replace
                  target_label: __address__
                  regex: (.+)
                  replacement: "$1:15020"

            # ── Waypoint proxies (ambient L7) ─────────────────────────────
            # Waypoint proxies are Envoy-based gateways that generate the full
            # set of Istio L7 metrics. They expose /stats/prometheus on port
            # 15020 (the metrics port, per the prometheus.io/port annotation).
            # Discovered via the istio.io/gateway-name=waypoint label which
            # is present on all waypoint pods.
            - job_name: waypoint-stats
              scrape_interval: 15s
              metrics_path: /stats/prometheus
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_istio_io_gateway_name]
                  action: keep
                  regex: waypoint
                - source_labels: [__meta_kubernetes_pod_ip]
                  action: replace
                  target_label: __address__
                  regex: (.+)
                  replacement: "$1:15020"

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
      # Filter processor drops high-cardinality metrics that Kiali doesn't need.
      # This replaces metric_relabel_configs which doesn't work in the OTel
      # Prometheus receiver (see note at top of file).
      filter:
        error_mode: ignore
        metrics:
          metric:
            - 'name == "scrape_duration_seconds"'
            - 'name == "scrape_samples_scraped"'
            - 'name == "scrape_samples_post_metric_relabeling"'
            - 'name == "scrape_series_added"'
            - 'name == "up"'
            - 'name == "istio_dns_requests_total"'
            - 'name == "istio_dns_upstream_requests_total"'
            - 'name == "istio_dns_upstream_failures_total"'
            - 'name == "istio_dns_upstream_request_duration_seconds"'
            - 'name == "istio_xds_connection_terminations_total"'
            - 'name == "istio_xds_message_total"'
            - 'name == "istio_xds_message_bytes_total"'
            - 'name == "workload_manager_active_proxy_count"'
            - 'name == "workload_manager_pending_proxy_count"'
            - 'name == "workload_manager_proxies_started_total"'
            - 'name == "workload_manager_proxies_stopped_total"'
      batch:
        send_batch_size: 2048
        timeout: 5s

    exporters:
      otlphttp:
        endpoint: http://victoriametrics-victoriametrics-vm-server.victoriametrics.svc.cluster.local:8428/opentelemetry

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, filter, batch]
          exporters: [otlphttp]