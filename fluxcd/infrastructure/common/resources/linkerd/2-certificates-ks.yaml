    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: linkerd-certificates
      namespace: flux-system
    spec:
      interval: 10m
      timeout: 10m
      retryInterval: 1m
      path: ./fluxcd/infrastructure/common/resources/linkerd/2-certificates
      prune: false
      force: false
      wait: true
      sourceRef:
        kind: GitRepository
        name: flux-system
      dependsOn:
        - name: linkerd-namespace
