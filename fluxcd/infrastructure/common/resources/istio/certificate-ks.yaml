    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: tls-cert
      namespace: flux-system
    spec:
      interval: 10m
      timeout: 10m
      retryInterval: 1m
      path: ./fluxcd/infrastructure/common/resources/istio/certificate
      prune: false
      force: false
      wait: true
      sourceRef:
        kind: GitRepository
        name: flux-system
      dependsOn:
        - name: istio-base
      postBuild:
        substituteFrom:
          - kind: ConfigMap
            name: cluster-vars
