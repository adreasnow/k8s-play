---
# North/South: External access via Traefik
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tempo-external-route
  namespace: telemetry
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - tempo.telemetry.${domain}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: telemetry-tempo-gateway
          port: 80
---
# East/West: Mesh access via GAMMA (Service parentRef)
# This handles internal path based routing
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tempo-mesh-route
  namespace: telemetry
spec:
  parentRefs:
    - name: telemetry-tempo-gateway # same ref for GAMMA pattern
      kind: Service
      group: ""       # core API group — standard GAMMA pattern
      port: 80
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: telemetry-tempo-gateway # same ref for GAMMA pattern
          port: 80
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: tempo-allow-mesh
  namespace: telemetry
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: telemetry-tempo-gateway
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/*"]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: tempo-require-waypoint
  namespace: telemetry
spec:
  # targetRefs is the ambient-native pattern; ztunnel enforces at L4
  # on the Service's backing workloads instead of a label selector.
  targetRefs:
    - group: ""
      kind: Service
      name: telemetry-tempo-gateway
  action: ALLOW
  rules:
    - from:
        - source:
            # Only accept from the namespace waypoint
            principals:
              - "cluster.local/ns/telemetry/sa/waypoint"
    - from:
        - source:
            # Allow same-namespace traffic (e.g. kubelet health probes
            # routed via ztunnel, or co-located services)
            namespaces: ["telemetry"]
