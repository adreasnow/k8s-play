apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: istio-base
  chart:
    spec:
      chart: istiod
      version: 1.29.1
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      interval: 1h
  targetNamespace: istio-system
  upgrade:
    cleanupOnFail: true
  values:
    profile: ambient
    meshConfig:
      # Disallows plaintext ingress by meshed services
      outboundTrafficPolicy:
        mode: REGISTRY_ONLY
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: istiod
