apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: linkerd-certificates
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: 1h
    fluxcd.controlplane.io/reconcileTimeout: 10m
spec:
  wait: true
  inputs:
    - name: linkerd-trust-root-issuer
      path: ./fluxcd/infrastructure/common/resources/cert-manager/linkerd/1-trust-root-issuer

    - name: trust-anchor
      path: ./fluxcd/infrastructure/common/resources/cert-manager/linkerd/2-trust-anchor
      deps: [linkerd-trust-root-issuer]

    - name: identity-issuer
      path: ./fluxcd/infrastructure/common/resources/cert-manager/linkerd/3-identity-issuer
      deps: [trust-anchor]

    - name: identity-issuer-cert
      path: ./fluxcd/infrastructure/common/resources/cert-manager/linkerd/4-identity-issuer-cert
      deps: [identity-issuer-cert]

    - name: trust-bundle
      path: ./fluxcd/infrastructure/common/resources/cert-manager/linkerd/5-trust-bundle
      deps: [trust-bundle]

  resourcesTemplate: |
    ---
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: << inputs.name >>
      namespace: flux-system
    spec:
      interval: 10m
      timeout: 10m
      retryInterval: 1m
      path: << inputs.path >>
      prune: false
      force: false
      wait: true
      sourceRef:
        kind: GitRepository
        name: flux-system
    <<- if get inputs "deps" >>
      dependsOn:
      <<- range $dep := inputs.deps >>
        - name: << $dep >>
      <<- end >>
    <<- end >>
