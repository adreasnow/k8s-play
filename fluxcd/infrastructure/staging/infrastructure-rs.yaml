apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: infrastructure
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: 1h
spec:
  inputs:
    - name: namespaces
      path: ./fluxcd/infrastructure/staging/namespaces
  resources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: << inputs.name >>
        namespace: flux-system
      spec:
        interval: 10m
        retryInterval: 1m
        path: << inputs.path >>
        prune: << get inputs "prune" | default "true" >>
        wait: true
        sourceRef:
          kind: GitRepository
          name: flux-system
