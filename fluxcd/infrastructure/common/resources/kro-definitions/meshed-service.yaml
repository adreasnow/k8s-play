apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: meshed-service-v1alpha1
spec:
  schema:
    apiVersion: v1alpha2
    group: bellroy.com
    kind: MeshedService
    scope: Namespaced
    types:
      HTTPRoute:
        enabled: boolean
        ports: '[]integer | required=true'
        paths: '[]string | default=["/"]'

      GRPCRoute:
        enabled: boolean
        ports: '[]integer | required=true'
        paths: '[]string | default=["/"]'

    spec:
      service: string | required=true
      hostname: string | required=false

      internal:
        http: HTTPRoute
        grpc: GRPCRoute

      external:
        http: HTTPRoute
        grpc: GRPCRoute

  resources:
    - id: clusterVars
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: cluster-vars
          namespace: flux-operator

    - id: northSouthRoute
      includeWhen:
        - ${schema.spec.external.http.enabled}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${schema.spec.service}
        spec:
          parentRefs:
            - name: traefik-gateway # north-south
              namespace: traefik
              sectionName: websecure
          hostnames:
            - ${schema.spec.hostname + "." + clusterVars.data.?domain.orValue("")}
          rules:
            - matches:
                '${schema.spec.external.http.paths.map(p, {"path": {"type": "PathPrefix", "value": p}})}'
              backendRefs:
                '${schema.spec.external.http.ports.map(p, {"name": schema.spec.service, "port": p})}'

    - id: eastWestHTTPRoute
      includeWhen:
        - ${schema.spec.external.http.enabled || schema.spec.internal.http.enabled}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${schema.spec.service}-mesh-route
          namespace: ${schema.metadata.namespace}
        spec:
          parentRefs:
            - name: ${schema.spec.service}
              kind: Service
              group: ""       # core API group — standard GAMMA pattern
              port: ${schema.spec.ports[0].port}
          rules:
            - matches:
                '${(schema.spec.internal.http.enabled ? schema.spec.internal.http.paths.map(p, {"path": {"type": "PathPrefix", "value": p}}) : []) +(schema.spec.external.http.enabled ? ${schema.spec.external.http.paths.map(p, {"path": {"type": "PathPrefix", "value": p}}) : [])}'
              backendRefs:
                '${(schema.spec.internal.http.enabled ? ${schema.spec.internal.http.ports.map(p, {"name": schema.spec.service, "port": p})) : []) +(schema.spec.external.http.ports.map(p, {"name": schema.spec.service, "port": p}) : [])}'

    - id: allowAllMeshedClients
      includeWhen:
        - ${schema.spec.ingress.enabled.external || schema.spec.ingress.enabled.internal}
      template:
        apiVersion: security.istio.io/v1
        kind: AuthorizationPolicy
        metadata:
          name: ${schema.spec.service}-allow-mesh
          namespace: ${schema.metadata.namespace}
        spec:
          targetRefs:
            - group: ""
              kind: Service
              name: ${schema.spec.service}
          action: ALLOW
          rules:
            - from:
                - source:
                    principals: ["cluster.local/*"]

    - id: requireWaypointAtL4
      includeWhen:
        - ${schema.spec.ingress.enabled.external || schema.spec.ingress.enabled.internal}
      template:
        apiVersion: security.istio.io/v1
        kind: AuthorizationPolicy
        metadata:
          name: ${schema.spec.service}-require-waypoint
          namespace: ${schema.metadata.namespace}
        spec:
          selector:
            matchLabels:
              app: ${schema.spec.service}
          action: ALLOW
          rules:
            - from:
                - source:
                    # Only accept from the namespace waypoint
                    principals:
                      - "cluster.local/ns/${schema.metadata.namespace}/sa/waypoint"
            - from:
                - source:
                    # Allow same-namespace traffic (e.g. kubelet health probes
                    # routed via ztunnel, or co-located services)
                    namespaces: ["${schema.metadata.namespace}"]
