apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: loki
      version: 13.2.2
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
      interval: 1h
  targetNamespace: loki
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: loki-values
      valuesKey: values
  values:
    fullname: loki-loki
    multitenancyEnabled: true
    replicas: ${azCount}
    loki.tag: 3.7.1

    # Swap these when S3 is available
    minio.enabled: true
    # storage:
    #   type: s3
    #   s3: s3://${awsRegion}/${lokiBucketName}
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: StatefulSet
              name: loki
            patch: |
              - op: add
                path: /spec/template/spec/topologySpreadConstraints
                value:
                  - maxSkew: 1
                    topologyKey: topology.kubernetes.io/zone
                    whenUnsatisfiable: DoNotSchedule
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: loki-loki
