apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: caretta
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: caretta
      version: 0.0.16
      sourceRef:
        kind: HelmRepository
        name: groundcover
        namespace: flux-system
      interval: 1h
  targetNamespace: caretta
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
