apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 10m
  timeout: 10m
  retryInterval: 1m
  path: ./fluxcd/infrastructure/base/resources/traefik
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cluster-issuer
    - name: gateway-api
    - name: namespaces-base
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
