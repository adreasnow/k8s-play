apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: otel
  namespace: flux-system
spec:
  interval: 10m
  timeout: 10m
  retryInterval: 1m
  path: ./fluxcd/infrastructure/common/resources/telemetry/otel
  prune: true
  force: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: telemetry-namespace
    - name: mimir
