apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkerd-crds
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: linkerd-crds
  chart:
    spec:
      chart: linkerd2-cni
      version: 2026.4.3
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
      interval: 1h
  targetNamespace: linkerd
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
