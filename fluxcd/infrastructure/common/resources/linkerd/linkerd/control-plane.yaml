apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkerd-control-plane
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: linkerd-crds
    - name: linkerd-cni
  chart:
    spec:
      chart: linkerd-control-plane
      version: 2026.4.3
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
      interval: 1h
  targetNamespace: linkerd
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # TODO: Enable CNI for EKS
    # cniEnabled: true
    identity:
      externalCA: true
      issuer:
        scheme: kubernetes.io/tls
