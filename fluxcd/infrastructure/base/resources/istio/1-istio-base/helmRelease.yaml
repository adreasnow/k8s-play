apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: istio-base
      version: 1.29.1
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      interval: 1h
  targetNamespace: istio-system
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
